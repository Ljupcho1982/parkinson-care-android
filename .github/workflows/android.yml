name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JS deps
        run: npm install

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" >/dev/null

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk ParkinsonCare.apk

      - name: Decode release keystore
        run: echo "${{ secrets.PLAY_KEYSTORE_B64 }}" | base64 -d > "$RUNNER_TEMP/upload-keystore.jks"

      - name: Build signed release AAB (for Google Play)
        env:
          PLAY_KEYSTORE_PATH: ${{ runner.temp }}/upload-keystore.jks
          PLAY_STORE_PASSWORD: ${{ secrets.PLAY_STORE_PASSWORD }}
          PLAY_KEY_ALIAS: ${{ secrets.PLAY_KEY_ALIAS }}
          PLAY_KEY_PASSWORD: ${{ secrets.PLAY_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon --stacktrace
          cp app/build/outputs/bundle/release/app-release.aab ../ParkinsonCare.aab

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ParkinsonCare-build
          path: |
            ParkinsonCare.apk
            ParkinsonCare.aab
          if-no-files-found: error

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Parkinson Care (latest build)
          files: |
            ParkinsonCare.apk
            ParkinsonCare.aab
          body: |
            Latest build of the Parkinson Care Android app.
            • **ParkinsonCare.apk** — install directly on a phone (allow "install unknown apps").
            • **ParkinsonCare.aab** — signed Android App Bundle to upload to Google Play.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
