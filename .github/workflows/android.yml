name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JS deps
        run: npm install

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" >/dev/null

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk parkinson-care.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: parkinson-care-apk
          path: parkinson-care.apk
          if-no-files-found: error

      - name: Publish APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Parkinson Care (latest build)
          files: parkinson-care.apk
          body: |
            Latest debug build of the Parkinson Care Android app.
            Download **parkinson-care.apk** below and install it on your phone
            (you may need to allow "Install unknown apps" for your browser/file manager).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
